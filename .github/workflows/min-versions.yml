name: Minimum dependency versions

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  min-versions:
    name: Test with lowest allowed deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      # Resolves every direct dependency to its lowest allowed version.
      # Our pins (Django>=4.2, libsass>=0.23) claim those floors work;
      # this job is what actually proves it.
      - name: Install with lowest-direct resolution
        run: uv sync --resolution=lowest-direct

      # Skip e2e tests: they need a Chromium binary, which is orthogonal
      # to the "do runtime dep floors still build?" question this job is
      # asking. Browser integration is covered in test.yml.
      - name: Run tests
        run: uv run pytest -v --tb=short --ignore=tests/test_e2e.py
