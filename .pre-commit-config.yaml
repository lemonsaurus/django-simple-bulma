# Run all hooks on both commit and push. The pre-push pass is a backstop:
# it catches anything that snuck in via `--no-verify`, an amend, or a fresh
# clone where `pre-commit install` was only wired for the pre-commit stage.
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
        exclude: ^django_simple_bulma/(css|bulma|extensions)/
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
        exclude: ^django_simple_bulma/(css|bulma|extensions)/

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/crate-ci/typos
    rev: v1.28.4
    hooks:
      - id: typos
        exclude: ^django_simple_bulma/(bulma|extensions|css)/
